name: Run Gemini Crawler

on:
  schedule:
    - cron: '0 1 * * *' # 每天台灣時間早上 9:00 (UTC 1:00) 執行
  workflow_dispatch:    # 讓你可以在 GitHub 頁面手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install yfinance google-generativeai requests
      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python Gemini_crawler.py
