name: Run Gemini Crawler # 工作流程的名稱，會顯示在 GitHub Actions 頁面上

on:
  schedule:
    - cron: '0 1 * * *' # 設定自動執行時間：每天台灣時間早上 9:00 (UTC 1:00)
  workflow_dispatch:    # 允許你在 GitHub 介面上手動點擊「Run workflow」按鈕觸發執行

jobs:
  build:                # 定義工作任務的名稱
    runs-on: ubuntu-latest # 指定執行環境，使用 GitHub 提供的最新版 Ubuntu 伺服器
    steps:
      - uses: actions/checkout@v3 # 步驟 1：下載你的程式碼庫到執行環境中
      
      - name: Set up Python     # 步驟 2：設定 Python 環境
        uses: actions/setup-python@v4 # 使用官方的 Python 設定工具
        with:
          python-version: '3.9' # 指定使用的 Python 版本
          
      - name: Install dependencies # 步驟 3：安裝程式所需的套件
        run: pip install yfinance google-generativeai requests # 安裝爬蟲、Gemini API 及請求套件
        
      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python Gemini_crawler.py
